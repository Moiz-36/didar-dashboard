name: Scheduled Web Scraper

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes in the cloud 24/7
  workflow_dispatch: # Allows you to force run it manually

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install playwright
        playwright install chromium

    - name: Run Scraper
      run: python scrape_dashboard.py

    - name: Save new data
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add data.json
        git commit -m "Automated data update" || exit 0
        git push
