name: Scheduled Web Scraper

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install playwright
        playwright install chromium

    - name: Run Web Scraper Engine
      run: python scrape_dashboard.py

    - name: Save Data File Changes to Repo
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add data.json
        git commit -m "Automated data sync update" || exit 0
        git push

    - name: Setup GitHub Pages Environment Modules
      uses: actions/configure-pages@v5

    - name: Upload Finished Web Artifacts
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy Live Dashboard Web Link
      id: deployment
      uses: actions/deploy-pages@v4
