<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pages to Didar - Full Name Stacked Edition</title>
    <style>
        /* Global Canvas Framework Configuration */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            font-size: min(0.50vw, 0.89vh);
        }
        
        body {
            font-family: "Gill Sans", "Gill Sans MT", Calibri, sans-serif;
            background-color: #F9F5EE;
            color: #967D55;
            height: 100vh;
            width: 100vw;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Double-Frame Board Design Layout border constraints */
        .outer-frame {
            border: 4rem solid #967D55;
            padding: 1rem;
            width: 100vw;
            height: 56.25vw;
            max-width: 177.78vh;
            max-height: 100vh;
            display: flex;
        }
        .inner-frame {
            border: 0.3rem solid #967D55;
            width: 100%;
            height: 100%;
            padding: 2.5rem 4rem;
            display: flex;
            flex-direction: column;
        }

        /* Top Header Area Configuration */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            margin-bottom: 1.5rem;
        }
        .title-area {
            min-width: 0;
        }
        .title-area h1 {
            font-size: 12rem;
            font-weight: bold;
            text-transform: uppercase;
            line-height: 0.95;
            margin-bottom: 0.8rem;
            white-space: nowrap;
        }
        .title-area .subtitle {
            font-size: 4.7rem;
            letter-spacing: 0.5px;
            font-weight: 500;
            color: #967D55;
        }
        .brand-logo {
            width: 22rem;
            height: auto;
        }

        /* Unified Header Metric Counters Bar Row */
        .metrics-bar {
            border-top: 0.4rem solid #967D55;
            border-bottom: 0.4rem solid #967D55;
            display: flex;
            padding: 1.3rem 0;
            margin-bottom: 1.8rem;
            width: 100%;
        }
        .metric-box {
            flex: 1;
            text-align: center;
        }
        .metric-value {
            font-size: 6.5rem;
            font-weight: bold;
            line-height: 1;
        }
        .metric-label {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        /* Dual Column Split Layout Workspace mapping */
        .main-workspace {
            display: flex;
            flex: 1;
            width: 100%;
            min-height: 0;
            gap: 3rem;
        }
        
        /* Modern Structured Container Cards (The Section Boxes) */
        .content-card-box {
            width: 50%;
            height: 100%;
            background-color: #F2EDE2; 
            border: 0.3rem solid #E5DEC9;
            border-radius: 1.6rem;
            padding: 2rem 2.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(150, 125, 85, 0.05);
        }
        
        /* Dynamic Inner Column Table Headings formatting */
        .section-heading {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            margin-bottom: 1.2rem;
            border-bottom: 0.4rem solid #967D55;
            padding-bottom: 0.6rem;
        }

        /* Chart Container holds rows vertically */
        .chart-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex: 1;
            overflow: hidden;
        }

        /* Chart Row stacked framework layout */
        .chart-row {
            display: flex;
            align-items: center;
            gap: 1.8rem;
            width: 100%;
            justify-content: center;
            min-height: 0;
        }

        /* Row Container to put the sleeker bar and number side-by-side */
        .bar-row-line {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 0;
            width: 100%;
        }

        /* Full Sized Text Label Block (Now sitting cleanly above the bar) */
        .label-text {
            width: 36%;
            flex: 0 0 36%;
            font-size: 2.4rem;
            font-weight: 500;
            text-transform: uppercase;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Sleeker Thinner Bar Tracks */
        .bar-track {
            flex: 1;
            height: 2.2rem; /* Complete background track for the filled bar */
            background-color: rgba(150, 125, 85, 0.18);
            border-radius: 0.4rem;
            overflow: hidden;
            margin-right: 1.4rem;
        }
        .progress-bar {
            background-color: #967D55;
            height: 100%;
            border-radius: 0.4rem;
            transition: width 1.2s cubic-bezier(0.1, 1, 0.1, 1);
            width: 0%;
        }

        /* Right End Counter Digits layout scaling */
        .value-counter {
            font-size: 2.5rem;
            font-weight: bold;
            min-width: 7rem;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="outer-frame">
        <div class="inner-frame">

            <div class="header-section">
                <div class="title-area">
                    <h1>Pages to Didar</h1>
                    <div class="subtitle">Embark on a shared reading journey in preparation for Didar</div>
                </div>
                <div class="brand-area">
                    <img src="logo.png" alt="Europe Visit" class="brand-logo" onerror="this.style.display='none'">
                </div>
            </div>

            <div class="metrics-bar">
                <div class="metric-box">
                    <div class="metric-value" id="totalPages">0</div>
                    <div class="metric-label">Pages Read</div>
                </div>
                <div class="metric-box">
                    <div class="metric-value" id="totalParticipants">0</div>
                    <div class="metric-label">Participants</div>
                </div>
                <div class="metric-box">
                    <div class="metric-value" id="totalScreenFree">0h</div>
                    <div class="metric-label">Screen Free Time</div>
                </div>
            </div>

            <div class="main-workspace">
                
                <div class="content-card-box">
                    <h2 class="section-heading">Participants</h2>
                    <div class="chart-container" id="leaderboardTarget"></div>
                </div>

                <div class="content-card-box">
                    <h2 class="section-heading">Reader by Age</h2>
                    <div class="chart-container" id="ageTarget"></div>
                </div>

            </div>

        </div>
    </div>

    <script>
        async function updateSignageUI() {
            try {
                // Incorporate dynamic cache-busting timestamp string parameter additions
                const uniqueTimestamp = new Date().getTime();
                const cacheBustingUrl = `data.json?t=${uniqueTimestamp}`;
                
                const res = await fetch(cacheBustingUrl);
                const dataset = await res.json();
                
                // Set Global Static Metric Totals fields text safely
                document.getElementById('totalPages').innerText = dataset.pages_read;
                document.getElementById('totalParticipants').innerText = dataset.participants;
                document.getElementById('totalScreenFree').innerText = dataset.screen_free_time;

                // 1. Process Center Board Layout List loop mappings array
                const lbTarget = document.getElementById('leaderboardTarget');
                lbTarget.innerHTML = '';
                
                const maxCityVal = dataset.leaderboard.length > 0 ? Math.max(...dataset.leaderboard.map(c => c.value)) : 100;
                
                dataset.leaderboard.slice(0, 10).forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'chart-row';
                    
                    const pct = maxCityVal > 0 ? (item.value / maxCityVal) * 100 : 0;
                    
                    // REMOVED ABBREVIATIONS: The item.city string will print exactly as grabbed from the webpage
                    row.innerHTML = `
                        <div class="label-text">${item.city}</div>
                        <div class="bar-row-line">
                            <div class="bar-track">
                                <div class="progress-bar" style="width: ${pct}%"></div>
                            </div>
                            <div class="value-counter">${item.value}h</div>
                        </div>
                    `;
                    lbTarget.appendChild(row);
                });

                // 2. Process Age Categories Breakdown Layout List loop mappings array
                const ageTarget = document.getElementById('ageTarget');
                ageTarget.innerHTML = '';
                
                const maxAgeVal = dataset.age_groups && dataset.age_groups.length > 0 ? Math.max(...dataset.age_groups.map(a => a.count)) : 100;
                
                if (dataset.age_groups) {
                    dataset.age_groups.forEach(item => {
                        const row = document.createElement('div');
                        row.className = 'chart-row';
                        
                        const pct = maxAgeVal > 0 ? (item.count / maxAgeVal) * 100 : 0;
                        
                        row.innerHTML = `
                            <div class="label-text">${item.band}</div>
                            <div class="bar-row-line">
                                <div class="bar-track">
                                    <div class="progress-bar" style="width: ${pct}%"></div>
                                </div>
                                <div class="value-counter">${item.count}</div>
                            </div>
                        `;
                        ageTarget.appendChild(row);
                    });
                }

            } catch (error) {
                console.error("UI Calculation processing layout engine execution catch event exception:", error);
            }
        }

        // Initialize display execution loops
        updateSignageUI();
        setInterval(updateSignageUI, 60000);
    </script>
</body>
</html>
